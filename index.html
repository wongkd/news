<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>宋嘉儀24小时专属助理</title>
<style>
  :root {
    --bg: #f5f5f5; --card: #ffffff; --text: #111111; --sub: #999999;
    --accent: #ff2442; --tab-active: #111111; --tab-inactive: #999999;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #111111; --card: #1c1c1c; --text: #e8e8e8; --sub: #777777; --tab-active: #e8e8e8; --tab-inactive: #666666; }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Helvetica Neue',sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased;
    letter-spacing: 0.2px;
  }
  .top-bar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(245,245,245,0.85); backdrop-filter: blur(20px);
    padding: 12px 16px 8px;
  }
  @media (prefers-color-scheme: dark) { .top-bar { background: rgba(17,17,17,0.85); } }
  .top-bar .brand-row { display: flex; flex-direction: column; align-items: center; margin-bottom: 12px; }
  .top-bar .phone-icon { font-size: 30px; cursor: pointer; user-select: none; line-height: 1; margin-bottom: 4px; }
  .phone-icon.pickup { animation: phonePickup 0.8s ease; }
  @keyframes phonePickup {
    0% { transform: translateY(0) rotate(0deg); } 20% { transform: translateY(-8px) rotate(-6deg); }
    40% { transform: translateY(-6px) rotate(5deg); } 60% { transform: translateY(-10px) rotate(-3deg); }
    80% { transform: translateY(-4px) rotate(2deg); } 100% { transform: translateY(0) rotate(0deg); }
  }
  .top-bar .brand-name { font-size: 16px; font-weight: 600; letter-spacing: 0.6px; }

  .tab-bar { display: flex; gap: 0; overflow-x: auto; scrollbar-width: none; }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-item {
    flex-shrink: 0; padding: 6px 16px; font-size: 14px; color: var(--tab-inactive); font-weight: 400;
    cursor: pointer; position: relative; transition: color 0.2s; white-space: nowrap;
    border: none; background: none; font-family: inherit;
  }
  .tab-item.active { color: var(--tab-active); font-weight: 600; }
  .tab-item.active::after { content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:18px; height:2.5px; border-radius:2px; background:var(--tab-active); }

  .masonry { max-width:620px; margin:0 auto; padding:4px 12px 60px; column-count:2; column-gap:10px; }

  .card {
    break-inside: avoid; margin-bottom:10px; background:var(--card);
    border-radius:20px; overflow:hidden; cursor:pointer;
    box-shadow:0 2px 16px rgba(0,0,0,0.04);
    transition: transform 0.15s cubic-bezier(0.22,0.61,0.36,1), box-shadow 0.15s ease;
  }
  .card:active { transform:translateY(2px) scale(0.985); box-shadow:0 1px 6px rgba(0,0,0,0.06); }
  .card.hidden { display:none; }
  .card .img-wrap { position:relative; width:100%; aspect-ratio:3/4; overflow:hidden; background:#eee; }
  @media (prefers-color-scheme: dark) { .card .img-wrap { background:#222; } }
  .card.first .img-wrap { aspect-ratio:2/3; }
  .card .img-wrap .img-bg { width:100%; height:100%; background-size:cover; background-position:center; background-color:#eee; }
  @media (prefers-color-scheme: dark) { .card .img-wrap .img-bg { background-color:#222; } }
  .card .img-wrap img { width:100%; height:100%; object-fit:cover; display:block; position:absolute; top:0; left:0; }

  .card .body { padding:8px 12px 12px; }
  .card .meta-tag { font-size:10px; font-weight:500; letter-spacing:0.3px; margin-bottom:3px; }
  .card.game .meta-tag { color:#e5536e; }
  .card.hardware .meta-tag { color:#0090ad; }
  .card.ai .meta-tag { color:#6c5ce7; }
  .card h2 { font-size:13px; font-weight:400; line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .card .source { font-size:10px; color:var(--sub); margin-top:5px; }

  .refresh-overlay {
    position:fixed; inset:0; z-index:200; background:rgba(245,245,245,0.6);
    display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px;
    opacity:0; pointer-events:none; transition:opacity 0.3s;
  }
  .refresh-overlay.active { opacity:1; pointer-events:all; }
  @media (prefers-color-scheme: dark) { .refresh-overlay { background:rgba(17,17,17,0.6); } }
  .refresh-spinner { width:36px; height:36px; border:3px solid #e0e0e0; border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .refresh-text { font-size:14px; color:var(--text); font-weight:500; }

  .modal-overlay { position:fixed; inset:0; z-index:999; background:var(--bg); overflow-y:auto; display:none; opacity:0; transition:opacity 0.2s; }
  .modal-overlay.open { display:block; opacity:1; }
  .modal-back { position:sticky; top:0; z-index:10; background:var(--bg); padding:14px 16px; font-size:14px; font-weight:500; cursor:pointer; }
  .modal-content { max-width:640px; margin:0 auto; padding:0 0 50px; }
  .modal-content .cover-full { width:100%; display:block; aspect-ratio:16/9; object-fit:cover; }
  .modal-content .detail-body { padding:20px 18px 30px; }
  .modal-content .detail-meta { font-size:12px; color:var(--sub); margin-bottom:14px; }
  .modal-content .detail-title { font-size:20px; font-weight:600; line-height:1.45; margin-bottom:16px; }
  .modal-content .detail-summary { font-size:14px; color:var(--sub); line-height:1.85; margin-bottom:28px; }
  .modal-content .detail-link { display:inline-block; font-size:12px; color:var(--accent); text-decoration:none; font-weight:500; padding:8px 18px; border:1px solid var(--accent); border-radius:20px; }

  .toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); z-index:300; background:var(--text); color:var(--bg); font-size:13px; padding:10px 20px; border-radius:20px; opacity:0; transition:opacity 0.3s; pointer-events:none; }
  .toast.show { opacity:1; }

  @media (max-width:480px) {
    .masonry { padding:4px 8px 50px; column-gap:8px; }
    .card { border-radius:16px; margin-bottom:8px; }
    .card .body { padding:6px 10px 10px; }
    .card h2 { font-size:11px; }
    .top-bar { padding:10px 12px 6px; }
    .tab-item { padding:5px 12px; font-size:13px; }
    .modal-content .detail-title { font-size:18px; }
  }
</style>
</head>
<body>

<div class="top-bar">
  <div class="brand-row">
    <span class="phone-icon" id="phoneIcon">☎️</span>
    <span class="brand-name">宋嘉儀 · 24小时专属助理</span>
  </div>
  <div class="tab-bar">
    <button class="tab-item active" data-cat="all">全部</button>
    <button class="tab-item" data-cat="game">游戏圈</button>
    <button class="tab-item" data-cat="hardware">硬件圈</button>
    <button class="tab-item" data-cat="ai">AI资讯</button>
  </div>
</div>

<div class="masonry" id="masonry"></div>

<div class="refresh-overlay" id="refreshOverlay">
  <div class="refresh-spinner"></div>
  <div class="refresh-text">正在刷新资讯...</div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modal">
  <div class="modal-back" id="modalBack">← 返回</div>
  <div class="modal-content">
    <img class="cover-full" id="modalCover" src="">
    <div class="detail-body">
      <div class="detail-meta"><span id="modalTag"></span> · <span id="modalSource"></span></div>
      <div class="detail-title" id="modalTitle"></div>
      <div class="detail-summary" id="modalSummary"></div>
      <a class="detail-link" id="modalLink" href="#" target="_blank">查看原文 →</a>
    </div>
  </div>
</div>

<script>
const DATA_URL = 'https://raw.githubusercontent.com/wongkd/news/main/data.json?v=' + Date.now();
const TAG_MAP = { game:'游戏圈', hardware:'硬件圈', ai:'AI资讯' };
let currentCat = 'all';
let cards = [];

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function renderCards(items) {
  const masonry = document.getElementById('masonry');
  masonry.innerHTML = '';
  items.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'card ' + item.cat + (i === 0 ? ' first' : '');
    card.dataset.cat = item.cat;
    card.dataset.title = item.title;
    card.dataset.summary = item.summary;
    card.dataset.source = item.source;
    card.dataset.url = item.url;
    card.dataset.tag = TAG_MAP[item.cat];
    card.innerHTML = `
      <div class="img-wrap">
        <div class="img-bg" style="background-image:url(${item.img})"></div>
      </div>
      <div class="body">
        <div class="meta-tag">${TAG_MAP[item.cat]}</div>
        <h2>${item.title}</h2>
        <div class="source">${item.source}</div>
      </div>`;
    masonry.appendChild(card);
  });
  cards = document.querySelectorAll('.card');
  bindCards();

  // Filter to current tab
  document.querySelectorAll('.tab-item').forEach(t => {
    if (t.dataset.cat === currentCat) t.classList.add('active');
    else t.classList.remove('active');
  });
  filterCards();
}

function filterCards() {
  cards.forEach(c => {
    c.classList.toggle('hidden', currentCat !== 'all' && c.dataset.cat !== currentCat);
  });
}

function bindCards() {
  cards.forEach(card => {
    card.addEventListener('click', function() {
      const bgDiv = this.querySelector('.img-bg');
      const bgImg = bgDiv ? bgDiv.style.backgroundImage.replace(/url\(["']?|["']?\)/g,'') : '';
      document.getElementById('modalCover').src = bgImg;
      document.getElementById('modalTag').textContent = this.dataset.tag;
      document.getElementById('modalSource').textContent = this.dataset.source;
      document.getElementById('modalTitle').textContent = this.dataset.title;
      document.getElementById('modalSummary').textContent = this.dataset.summary;
      document.getElementById('modalLink').href = this.dataset.url;
      document.getElementById('modal').classList.add('open');
      document.body.style.overflow = 'hidden';
    });
  });
}

async function loadData(silent) {
  try {
    const resp = await fetch(DATA_URL, { cache: 'no-store' });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    renderCards(data.items);
    if (!silent) showToast('✅ 资讯已刷新 (' + data.items.length + '条)');
  } catch(e) {
    showToast('⚠️ 刷新失败，请稍后重试');
  }
}

// ── Init ──
loadData(true);

// ── Phone refresh ──
document.getElementById('phoneIcon').addEventListener('click', function(e) {
  e.stopPropagation();
  const icon = this, overlay = document.getElementById('refreshOverlay');
  icon.classList.remove('pickup'); void icon.offsetWidth; icon.classList.add('pickup');
  setTimeout(() => overlay.classList.add('active'), 400);
  setTimeout(async () => {
    await loadData(false);
    overlay.classList.remove('active');
  }, 1200);
});

// ── Tab switching ──
document.querySelectorAll('.tab-item').forEach(tab => {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
    currentCat = this.dataset.cat;
    filterCards();
  });
});

// ── Modal ──
const modal = document.getElementById('modal');
document.getElementById('modalBack').addEventListener('click', () => { modal.classList.remove('open'); document.body.style.overflow = ''; });
modal.addEventListener('click', e => { if(e.target===modal){modal.classList.remove('open');document.body.style.overflow='';} });
document.addEventListener('keydown', e => { if(e.key==='Escape'&&modal.classList.contains('open')){modal.classList.remove('open');document.body.style.overflow='';} });
</script>
</body>
</html>
