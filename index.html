<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>宋嘉儀24小时专属助理</title>
<style>
  :root {
    --bg: #f5f5f5; --card: #ffffff; --text: #111111; --sub: #999999;
    --accent: #ff2442; --tab-active: #111111; --tab-inactive: #999999;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #111111; --card: #1c1c1c; --text: #e8e8e8; --sub: #777777; --tab-active: #e8e8e8; --tab-inactive: #666666; }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Helvetica Neue',sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased;
    letter-spacing: 0.2px;
  }
  .top-bar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(245,245,245,0.85); backdrop-filter: blur(20px);
    padding: 12px 16px 8px;
  }
  @media (prefers-color-scheme: dark) { .top-bar { background: rgba(17,17,17,0.85); } }
  .top-bar .brand-row { display: flex; flex-direction: column; align-items: center; margin-bottom: 12px; }
  .top-bar .phone-icon { font-size: 30px; cursor: pointer; user-select: none; line-height: 1; margin-bottom: 4px; }
  .phone-icon.pickup { animation: phonePickup 0.8s ease; }
  @keyframes phonePickup {
    0% { transform: translateY(0) rotate(0deg); } 20% { transform: translateY(-8px) rotate(-6deg); }
    40% { transform: translateY(-6px) rotate(5deg); } 60% { transform: translateY(-10px) rotate(-3deg); }
    80% { transform: translateY(-4px) rotate(2deg); } 100% { transform: translateY(0) rotate(0deg); }
  }
  .top-bar .brand-name { font-size: 16px; font-weight: 600; letter-spacing: 0.6px; }

  .tab-bar { display: flex; gap: 0; overflow-x: auto; scrollbar-width: none; }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-item {
    flex-shrink: 0; padding: 6px 16px; font-size: 14px; color: var(--tab-inactive); font-weight: 400;
    cursor: pointer; position: relative; transition: color 0.2s; white-space: nowrap;
    border: none; background: none; font-family: inherit;
  }
  .tab-item.active { color: var(--tab-active); font-weight: 600; }
  .tab-item.active::after { content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:18px; height:2.5px; border-radius:2px; background:var(--tab-active); }

  .masonry { max-width:620px; margin:0 auto; padding:4px 12px 60px; column-count:2; column-gap:10px; }

  .card {
    break-inside: avoid; margin-bottom:10px; background:var(--card);
    border-radius:20px; overflow:hidden; cursor:pointer;
    box-shadow:0 2px 16px rgba(0,0,0,0.04);
    transition: transform 0.15s cubic-bezier(0.22,0.61,0.36,1), box-shadow 0.15s ease;
  }
  .card:active { transform:translateY(2px) scale(0.985); box-shadow:0 1px 6px rgba(0,0,0,0.06); }
  .card.hidden { display:none; }
  .card .img-wrap { position:relative; width:100%; aspect-ratio:3/4; overflow:hidden; background:#eee; }
  @media (prefers-color-scheme: dark) { .card .img-wrap { background:#222; } }
  .card.first .img-wrap { aspect-ratio:2/3; }
  .card .img-wrap .img-bg { width:100%; height:100%; background-size:cover; background-position:center; background-color:#eee; }
  @media (prefers-color-scheme: dark) { .card .img-wrap .img-bg { background-color:#222; } }
  .card .img-wrap img { width:100%; height:100%; object-fit:cover; display:block; position:absolute; top:0; left:0; }

  .card .body { padding:8px 12px 12px; }
  .card .meta-tag { font-size:10px; font-weight:500; letter-spacing:0.3px; margin-bottom:3px; }
  .card.game .meta-tag { color:#e5536e; }
  .card.hardware .meta-tag { color:#0090ad; }
  .card.ai .meta-tag { color:#6c5ce7; }
  .card h2 { font-size:13px; font-weight:400; line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .card .source { font-size:10px; color:var(--sub); margin-top:5px; }

  .refresh-overlay {
    position:fixed; inset:0; z-index:200; background:rgba(245,245,245,0.6);
    display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px;
    opacity:0; pointer-events:none; transition:opacity 0.3s;
  }
  .refresh-overlay.active { opacity:1; pointer-events:all; }
  @media (prefers-color-scheme: dark) { .refresh-overlay { background:rgba(17,17,17,0.6); } }
  .refresh-spinner { width:36px; height:36px; border:3px solid #e0e0e0; border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .refresh-text { font-size:14px; color:var(--text); font-weight:500; }

  .modal-overlay {
    position:fixed; inset:0; z-index:999;
    background:rgba(0,0,0,0.35);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none;
    transition:opacity 0.25s ease;
    padding:24px 16px;
  }
  .modal-overlay.open { opacity:1; pointer-events:all; }

  .modal-card {
    background:var(--card); border-radius:18px; overflow:hidden;
    width:100%; max-width:440px; max-height:90vh;
    box-shadow:0 20px 60px rgba(0,0,0,0.15);
    transform:translateY(30px) scale(0.95);
    transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    overflow-y:auto; -webkit-overflow-scrolling:touch;
  }
  .modal-overlay.open .modal-card {
    transform:translateY(0) scale(1);
  }

  .modal-card .cover-full { width:100%; display:block; aspect-ratio:16/9; object-fit:cover; }
  .modal-card .detail-body { padding:18px 18px 24px; }
  .modal-card .detail-meta { font-size:12px; color:var(--sub); margin-bottom:12px; }
  .modal-card .detail-title { font-size:18px; font-weight:600; line-height:1.45; margin-bottom:12px; }
  .modal-card .detail-summary { font-size:14px; color:var(--sub); line-height:1.8; margin-bottom:20px; }
  .modal-card .detail-link { display:inline-block; font-size:12px; color:var(--accent); text-decoration:none; font-weight:500; padding:8px 18px; border:1px solid var(--accent); border-radius:20px; margin-top:4px; }
  .modal-card .close-hint { text-align:center; padding:10px; font-size:11px; color:var(--sub); border-top:0.5px solid rgba(128,128,128,0.1); cursor:pointer; }

  .toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); z-index:300; background:var(--text); color:var(--bg); font-size:13px; padding:10px 20px; border-radius:20px; opacity:0; transition:opacity 0.3s; pointer-events:none; }
  .toast.show { opacity:1; }

  @media (max-width:480px) {
    .masonry { padding:4px 8px 50px; column-gap:8px; }
    .card { border-radius:16px; margin-bottom:8px; }
    .card .body { padding:6px 10px 10px; }
    .card h2 { font-size:11px; }
    .top-bar { padding:10px 12px 6px; }
    .tab-item { padding:5px 12px; font-size:13px; }
    .modal-content .detail-title { font-size:18px; }
  }
</style>
</head>
<body>

<div class="top-bar">
  <div class="brand-row">
    <span class="phone-icon" id="phoneIcon">☎️</span>
    <span class="brand-name">宋嘉儀 · 24小时专属助理</span>
  </div>
  <div class="tab-bar">
    <button class="tab-item active" data-cat="all">全部</button>
    <button class="tab-item" data-cat="game">游戏圈</button>
    <button class="tab-item" data-cat="hardware">硬件圈</button>
    <button class="tab-item" data-cat="ai">AI资讯</button>
  </div>
</div>

<div class="masonry" id="masonry"></div>
<div style="text-align:center;padding:10px 0 30px;">
  <button id="loadMoreBtn" onclick="loadMore()" style="background:var(--card);color:var(--accent);border:1px solid var(--accent);border-radius:20px;padding:10px 28px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;display:none;">加载更多</button>
</div>

<div class="refresh-overlay" id="refreshOverlay">
  <div class="refresh-spinner"></div>
  <div class="refresh-text">正在刷新资讯...</div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modal">
  <div class="modal-card">
    <img class="cover-full" id="modalCover" src="">
    <div class="detail-body">
      <div class="detail-meta"><span id="modalTag"></span> · <span id="modalSource"></span></div>
      <div class="detail-title" id="modalTitle"></div>
      <div class="detail-summary" id="modalSummary"></div>
      <a class="detail-link" id="modalLink" href="#" target="_blank">查看原文 →</a>
    </div>
    <div class="close-hint" id="closeHint">点击空白处关闭</div>
  </div>
</div>

<script>
const DATA_URL = 'https://raw.githubusercontent.com/wongkd/news/main/data.json?v=' + Date.now();
const TAG_MAP = { game:'游戏圈', hardware:'硬件圈', ai:'AI资讯' };
let currentCat = 'all';
let cards = [];
let allItems = [];
const PAGE_SIZE = 12;
let loadedCount = 0;

// Embedded fallback data
const fallbackItems = [{"cat":"game","title":"索尼State of Play","summary":"Sony展示了大量重磅游戏：漫威金刚狼深度演示、战神新作菲主演首次亮相、古墓丽影完全重制版确认、寂静岭Townfall新预告公开。","source":"17173","url":"https://news.17173.com/content/06032026/064803381.shtml","img":"https://images.unsplash.com/photo-1511512578047-dfb367046420?w=400&h=533&fit=crop&auto=format"},{"cat":"game","title":"6月新游发售表","summary":"NS2迎来《星际火狐》《FF7重生》等3A大作；Switch有《热血西游记》《一起开火车2》《潜水员戴夫：丛林》。端午三天不调休。","source":"腾讯新闻","url":"https://www.sohu.com/a/1029702669_122598898","img":"https://images.unsplash.com/photo-1552820728-8b83bb6b2f51?w=400&h=533&fit=crop&auto=format"},{"cat":"game","title":"5月游戏版号获批","summary":"154款国产+4款进口游戏获批。腾讯《追逐卡蕾多》、网易《诡影藏锋》、莉莉丝《小冰冰斗蛐蛐》等在列。","source":"新京报","url":"https://www.msn.cn/","img":"https://images.unsplash.com/photo-1538481199705-c710c4e965fc?w=400&h=533&fit=crop&auto=format"},{"cat":"game","title":"《Clutch》开放世界驾驶新作","summary":"前极限竞速创意总监迈克·布朗创立Maverick Games，公布首个作品《Clutch》，预计2027年春季发售。","source":"3DM游戏网","url":"https://www.3dmgame.com/news/game/","img":"https://images.unsplash.com/photo-1509198397868-475647b2a1e5?w=400&h=533&fit=crop&auto=format"},{"cat":"hardware","title":"英伟达正式入局PC CPU","summary":"COMPUTEX最大猛料：英伟达联手联发科推RTX Spark芯片，20核Grace CPU+Blackwell GPU+128GB统一内存，AI算力1 petaflop。","source":"搜狐科技","url":"https://www.sohu.com/a/1030951328_121761735","img":"https://images.unsplash.com/photo-1555680202-c86f0e12f086?w=400&h=533&fit=crop&auto=format"},{"cat":"hardware","title":"英特尔LGA 1954长周期插槽","summary":"英特尔公布三代CPU共用同一插槽规划。微星MSI 40周年全系新品齐发：Titan 18 HX典藏版笔记本、新一代掌机。","source":"ZOL","url":"https://pc.zol.com.cn/1192/11923520.html","img":"https://images.unsplash.com/photo-1591799264318-7e6ef8ddb7ea?w=400&h=533&fit=crop&auto=format"},{"cat":"hardware","title":"COMPUTEX 1500家展商聚焦AI","summary":"台北国际电脑展共1500家企业参展，6000个展位聚焦AI运算、机器人及次世代科技。","source":"综合报道","url":"https://www.msn.cn/","img":"https://images.unsplash.com/photo-1625842268584-8f3296236761?w=400&h=533&fit=crop&auto=format"},{"cat":"hardware","title":"先马双曲面玻璃机箱上新","summary":"国产机电品牌先马展出V80、V70机箱。双曲面钢化玻璃面板+环境灯效悬浮设计，支持60W PD-out USB-C。","source":"新浪科技","url":"https://finance.sina.com.cn/tech/digi/2026-05-29/doc-inhzqimi9423178.shtml","img":"https://images.unsplash.com/photo-1587202372775-e229f172b9d7?w=400&h=533&fit=crop&auto=format"},{"cat":"ai","title":"腾讯混元发布Hy-Memory","summary":"基于6层记忆框架与双系统架构的记忆插件，记忆数量减70%+，信息密度提升45%，token消耗降35%。","source":"腾讯混元","url":"https://x.com/TencentHunyuan/status/2061372535267357029","img":"https://images.unsplash.com/photo-1677442136019-21780ecad995?w=400&h=533&fit=crop&auto=format"},{"cat":"ai","title":"Anthropic秘密提交IPO","summary":"向SEC秘密提交S-1草案，估值9650亿美元。刚完成650亿美元H轮融资，发布Claude Opus 4.8。","source":"Anthropic","url":"https://www.anthropic.com/news/confidential-draft-s1-sec","img":"https://images.unsplash.com/photo-1620712943543-bcc4688e7485?w=400&h=533&fit=crop&auto=format"},{"cat":"ai","title":"智谱冲刺科创板上市","summary":"拟发行2%-8%新股，募资投入AI通用基座大模型和MaaS平台，同时拟更名Z.AI Co., Ltd。","source":"IT之家","url":"https://www.ithome.com/0/958/444.htm","img":"https://images.unsplash.com/photo-1485827404703-89b55fcc595e?w=400&h=533&fit=crop&auto=format"},{"cat":"ai","title":"OpenAI Stargate 1GW数据中心","summary":"密歇根Stargate 1GW数据中心破土动工。上海十五五规划：多模态智能体、智能驾驶和具身智能产品。","source":"OpenAI / 上海发布","url":"https://openai.com/index/stargate-michigan-data-center","img":"https://images.unsplash.com/photo-1488229297570-58520851e868?w=400&h=533&fit=crop&auto=format"}];

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function renderCards(items) {
  const masonry = document.getElementById('masonry');
  items.forEach((item, i) => {
    const idx = loadedCount + i;
    const card = document.createElement('div');
    card.className = 'card ' + item.cat + (idx === 0 ? ' first' : '');
    card.dataset.cat = item.cat;
    card.dataset.title = item.title;
    card.dataset.summary = item.summary;
    card.dataset.source = item.source;
    card.dataset.url = item.url;
    card.dataset.tag = TAG_MAP[item.cat];
    card.innerHTML = `
      <div class="img-wrap">
        <div class="img-bg" style="background-image:url(${item.img})"></div>
      </div>
      <div class="body">
        <div class="meta-tag">${TAG_MAP[item.cat]}</div>
        <h2>${item.title}</h2>
        <div class="source">${item.source}</div>
      </div>`;
    masonry.appendChild(card);
  });
  loadedCount += items.length;
  cards = document.querySelectorAll('.card');
  bindCards();
  updateLoadMoreBtn();
  filterCards();
}

function loadMore() {
  const filtered = currentCat === 'all' ? allItems : allItems.filter(i => i.cat === currentCat);
  const next = filtered.slice(loadedCount, loadedCount + PAGE_SIZE);
  if (next.length) renderCards(next);
}

function updateLoadMoreBtn() {
  const btn = document.getElementById('loadMoreBtn');
  const filtered = currentCat === 'all' ? allItems : allItems.filter(i => i.cat === currentCat);
  if (loadedCount >= filtered.length) {
    btn.textContent = '—— 已加载全部' + filtered.length + '条 ——';
    btn.style.pointerEvents = 'none';
    btn.style.opacity = '0.5';
  } else {
    btn.textContent = '加载更多 (' + (filtered.length - loadedCount) + '条)';
    btn.style.pointerEvents = 'all';
    btn.style.opacity = '1';
  }
}

function resetAndRender(items) {
  document.getElementById('masonry').innerHTML = '';
  loadedCount = 0;
  document.getElementById('loadMoreBtn').style.display = 'block';
  const first = items.slice(0, PAGE_SIZE);
  renderCards(first);
}

function filterCards() {
  cards.forEach(c => {
    c.classList.toggle('hidden', currentCat !== 'all' && c.dataset.cat !== currentCat);
  });
}

function bindCards() {
  cards.forEach(card => {
    card.addEventListener('click', function() {
      const bgDiv = this.querySelector('.img-bg');
      const bgImg = bgDiv ? bgDiv.style.backgroundImage.replace(/url\(["']?|["']?\)/g,'') : '';
      document.getElementById('modalCover').src = bgImg;
      document.getElementById('modalTag').textContent = this.dataset.tag;
      document.getElementById('modalSource').textContent = this.dataset.source;
      document.getElementById('modalTitle').textContent = this.dataset.title;
      document.getElementById('modalSummary').textContent = this.dataset.summary;
      document.getElementById('modalLink').href = this.dataset.url;
      document.getElementById('modal').classList.add('open');
      document.body.style.overflow = 'hidden';
    });
  });
}

async function loadData(silent) {
  try {
    const resp = await fetch(DATA_URL, { cache: 'no-store' });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    allItems = data.items;
    resetAndRender(allItems);
    document.getElementById('loadMoreBtn').style.display = 'block';
    if (!silent) showToast('✅ 资讯已刷新 (' + data.items.length + '条)');
  } catch(e) {
    if (fallbackItems.length) {
      allItems = fallbackItems;
      resetAndRender(allItems);
      document.getElementById('loadMoreBtn').style.display = 'block';
      if (!silent) showToast('📡 离线模式');
    } else {
      showToast('⚠️ 刷新失败');
    }
  }
}

// ── Init ──
loadData(true);

// ── Phone refresh ──
document.getElementById('phoneIcon').addEventListener('click', function(e) {
  e.stopPropagation();
  const icon = this, overlay = document.getElementById('refreshOverlay');
  icon.classList.remove('pickup'); void icon.offsetWidth; icon.classList.add('pickup');
  setTimeout(() => overlay.classList.add('active'), 400);
  setTimeout(async () => {
    await loadData(false);
    overlay.classList.remove('active');
  }, 1200);
});

// ── Tab switching ──
document.querySelectorAll('.tab-item').forEach(tab => {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
    currentCat = this.dataset.cat;
    const filtered = currentCat === 'all' ? allItems : allItems.filter(i => i.cat === currentCat);
    document.getElementById('masonry').innerHTML = '';
    loadedCount = 0;
    const first = filtered.slice(0, PAGE_SIZE);
    renderCards(first);
  });
});

// Modal (popup card with blurred backdrop)
const modal = document.getElementById('modal');
modal.addEventListener('click', e => {
  if(e.target === modal) { modal.classList.remove('open'); document.body.style.overflow = ''; }
});
document.getElementById('closeHint').addEventListener('click', () => { modal.classList.remove('open'); document.body.style.overflow = ''; });
document.addEventListener('keydown', e => { if(e.key==='Escape'&&modal.classList.contains('open')){modal.classList.remove('open');document.body.style.overflow='';} });
</script>
</body>
</html>
